<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<!-- NAVBAR -->

<nav class="flex justify-between p-6 bg-black">

<h1 class="text-2xl text-cyan-400 font-bold">Chenchu.dev</h1>

<ul class="flex gap-8">

<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html" class="text-cyan-400">Contact</a></li>

</ul>

</nav>


<!-- CONTACT SECTION -->

<section class="py-32 text-center">

<h2 class="text-4xl font-bold mb-8">Contact Me</h2>

<form id="contactForm" class="max-w-xl mx-auto space-y-6">

<input
type="text"
placeholder="Your Name"
required
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input
type="email"
placeholder="Your Email"
required
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<textarea
placeholder="Your Message"
required
class="w-full p-3 rounded bg-gray-800 border border-gray-700 h-32"></textarea>

<button
type="submit"
class="bg-cyan-500 px-8 py-3 rounded hover:bg-cyan-700 transition">

Send Message

</button>

</form>

</section>


<!-- POPUP MODAL -->

<div id="popup" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">

<div class="bg-white text-black p-8 rounded-lg text-center">

<h2 class="text-2xl font-bold mb-4">Message Sent ✅</h2>

<p>Your message has been sent successfully.</p>

<button onclick="closePopup()" 
class="mt-6 bg-cyan-500 text-white px-6 py-2 rounded">

OK

</button>

</div>

</div>


<script>

const form = document.getElementById("contactForm")
const popup = document.getElementById("popup")

form.addEventListener("submit",function(e){

e.preventDefault()

form.reset()

popup.classList.remove("hidden")
popup.classList.add("flex")

})

function closePopup(){

popup.classList.add("hidden")

}

</script>

</body>
</html>
